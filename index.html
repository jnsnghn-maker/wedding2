<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>우리 결혼해요</title>
  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #FAF8F5;
    }
    .iframe-container {
      width: 100%; height: 100%; overflow: hidden; position: relative;
    }
    iframe {
      width: 100%;
      height: calc(100% + 55px);
      border: none;
      position: absolute;
      top: -55px;
      left: 0;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe src="https://script.google.com/macros/s/14ZS5HkLx2sMHLeGJaUXhlgDZYnolv5pDLDjGt3JFMQ0/exec"></iframe>
  </div>
</body>
</html>
